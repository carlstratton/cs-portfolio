<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Extruded Badge Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';

    const SVG_STRING = `<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M0 76C0 34.0264 34.0264 0 76 0H436C477.974 0 512 34.0264 512 76V436C512 477.974 477.974 512 436 512H76C34.0264 512 0 477.974 0 436V76Z" fill="#D9D9D9"/>
</svg>`;

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a2a);

    // Camera
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 120);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    const width = Math.max(window.innerWidth || 800, 400);
    const height = Math.max(window.innerHeight || 600, 300);
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.9);
    mainLight.position.set(50, 80, 50);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    mainLight.shadow.camera.near = 0.5;
    mainLight.shadow.camera.far = 200;
    mainLight.shadow.camera.left = -60;
    mainLight.shadow.camera.right = 60;
    mainLight.shadow.camera.top = 60;
    mainLight.shadow.camera.bottom = -60;
    mainLight.shadow.bias = -0.0001;
    scene.add(mainLight);

    const rimLight = new THREE.DirectionalLight(0x9ccfff, 0.4);
    rimLight.position.set(-30, 20, -50);
    scene.add(rimLight);

    // Shadow plane
    const planeGeometry = new THREE.PlaneGeometry(200, 200);
    const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.25 });
    const shadowPlane = new THREE.Mesh(planeGeometry, planeMaterial);
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.y = -45;
    shadowPlane.receiveShadow = true;
    scene.add(shadowPlane);

    // Extrusion settings
    const extrudeSettings = {
      depth: 20,
      bevelEnabled: true,
      bevelThickness: 2,
      bevelSize: 2,
      bevelSegments: 4,
      curveSegments: 32,
    };

    // Material
    const material = new THREE.MeshPhysicalMaterial({
      color: 0x9ccfff,
      roughness: 0.25,
      metalness: 0.1,
      clearcoat: 1,
      clearcoatRoughness: 0.1,
      flatShading: false,
    });

    let mesh = null;

    // Extrusion settings (used by fallback)
    const extrudeSettingsForFallback = extrudeSettings;

    // Helper: create rounded rect shape (fallback if SVG fails)
    function createRoundedRectShape(w, h, r) {
      const shape = new THREE.Shape();
      const x = 0, y = 0;
      shape.moveTo(x + r, y);
      shape.lineTo(x + w - r, y);
      shape.quadraticCurveTo(x + w, y, x + w, y + r);
      shape.lineTo(x + w, y + h - r);
      shape.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      shape.lineTo(x + r, y + h);
      shape.quadraticCurveTo(x, y + h, x, y + h - r);
      shape.lineTo(x, y + r);
      shape.quadraticCurveTo(x, y, x + r, y);
      return shape;
    }

    function createMeshFromGroup(group) {
      if (group.children.length === 0) return null;

      const box = new THREE.Box3().setFromObject(group);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      group.position.sub(center);
      group.scale.y *= -1;

      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 80 / maxDim;
      group.scale.multiplyScalar(scale);

      return group;
    }

    // Debug cube (shows immediately, removed when SVG/fallback loads)
    const debugGeometry = new THREE.BoxGeometry(10, 10, 10);
    const debugMaterial = new THREE.MeshBasicMaterial({ color: 0xff6600 });
    const debugCube = new THREE.Mesh(debugGeometry, debugMaterial);
    scene.add(debugCube);

    // Load SVG and create extruded mesh (parse inline to avoid CORS)
    const loader = new SVGLoader();
    const data = loader.parse(SVG_STRING);

    function buildMeshFromData(data) {
        const paths = data.paths;
        const group = new THREE.Group();

        for (let i = 0; i < paths.length; i++) {
          const path = paths[i];
          const fillColor = path.userData?.style?.fill;
          if (fillColor === 'none') continue;

          const shapes = SVGLoader.createShapes(path);

          for (let j = 0; j < shapes.length; j++) {
            const geometry = new THREE.ExtrudeGeometry(shapes[j], extrudeSettings);
            const meshPart = new THREE.Mesh(geometry, material);
            meshPart.castShadow = true;
            meshPart.receiveShadow = true;
            group.add(meshPart);
          }
        }

        if (group.children.length === 0) {
          // Fallback: create rounded rect from scratch (matches SVG viewBox 512x512, radius 76)
          const fallbackShape = createRoundedRectShape(512, 512, 76);
          const geometry = new THREE.ExtrudeGeometry(fallbackShape, extrudeSettingsForFallback);
          const meshPart = new THREE.Mesh(geometry, material);
          meshPart.castShadow = true;
          meshPart.receiveShadow = true;
          group.add(meshPart);
        }

      const finalMesh = createMeshFromGroup(group);
      if (finalMesh) {
        mesh = finalMesh;
        scene.remove(debugCube);
        debugGeometry.dispose();
        debugMaterial.dispose();
        scene.add(mesh);
      }
    }

    try {
      buildMeshFromData(data);
    } catch (err) {
      console.error('SVG parse error:', err);
      const fallbackShape = createRoundedRectShape(512, 512, 76);
      const geometry = new THREE.ExtrudeGeometry(fallbackShape, extrudeSettingsForFallback);
      const meshPart = new THREE.Mesh(geometry, material);
      meshPart.castShadow = true;
      meshPart.receiveShadow = true;
      const group = new THREE.Group();
      group.add(meshPart);
      const finalMesh = createMeshFromGroup(group);
      if (finalMesh) {
        mesh = finalMesh;
        scene.remove(debugCube);
        debugGeometry.dispose();
        debugMaterial.dispose();
        scene.add(mesh);
      }
    }

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      if (mesh) {
        mesh.rotation.y += 0.005;
        mesh.rotation.x += 0.002;
      }

      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      const w = Math.max(window.innerWidth || 800, 400);
    const h = Math.max(window.innerHeight || 600, 300);
    camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
</body>
</html>
